{% extends "base.html" %}

{% block title %}Sign Up - DigitalForge{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="w-12 h-12 bg-gradient-to-br from-primary-600 to-accent-500 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="hammer" class="w-7 h-7 text-white"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-900">Create your account</h2>
            <p class="mt-2 text-gray-600">Start buying and selling digital products</p>
        </div>

        <form class="mt-8 space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-gray-200" method="POST" action="{{ url_for('auth.register') }}">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" required minlength="3"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition"
                           placeholder="johndoe" value="{{ username if username else '' }}">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input id="email" name="email" type="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition"
                           placeholder="you@example.com" value="{{ email if email else '' }}">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required minlength="8"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition"
                           placeholder="Minimum 8 characters">
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition"
                           placeholder="Repeat password">
                </div>

                <div>
                    <label for="wallet_address" class="block text-sm font-medium text-gray-700 mb-1">Wallet Address (optional)</label>
                    <input id="wallet_address" name="wallet_address" type="text"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition"
                           placeholder="0x..." value="{{ wallet if wallet else '' }}">
                    <p class="mt-1 text-xs text-gray-500">For receiving crypto payments</p>
                </div>

                <div class="flex items-center">
                    <input id="become_seller" name="become_seller" type="checkbox"
                           class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
                    <label for="become_seller" class="ml-2 block text-sm text-gray-700">
                        I want to sell products on DigitalForge
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-xl font-semibold hover:bg-primary-700 transition shadow-lg shadow-primary-500/30">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="font-medium text-primary-600 hover:text-primary-500">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
